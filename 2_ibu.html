<html>
    <head>
        <title>bold, italic and underline tag</title>
    </head>
    <body>
        <!--in this we use b for bold tag-->
        <b>this is bold tag </b><br>
        <!--in this we use i for italic tag-->
        <i>this is italic tag</i><br>
        <!--in this we use u for underline tag-->
        <u>this is underline tag</u>
    </body>
</html>
