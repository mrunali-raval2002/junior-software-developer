<html>
    <head>
        <title> list tag </title>
    </head>
    <body>
        <h1><font color="#600000">indian states</font></h1>
        <!--unordered list-->
        <ul type="square">
            <li>andhra pradesh</li>
            <li>gujarat</li>
            <li>maharashtra</li>
            <li>rajasthan</li>
            <li>madhya pradesh</li>
            <ol type="1">
                 <li>himachal pradesh </li>
                <li>arunachal pradesh</li>
            </ol>
        </ul>
    </body>
</html>
